name: CI

on:
  push:
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - "Icon.png"
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - "Icon.png"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore DotVgn.slnx

      - name: Check vulnerable packages
        run: dotnet list DotVgn.slnx package --vulnerable
        continue-on-error: true

      - name: Build
        run: dotnet build DotVgn.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test DotVgn.slnx --no-build --configuration Release --logger "trx" --collect "XPlat Code Coverage" --results-directory TestResults/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 14
